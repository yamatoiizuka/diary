name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 新しいpushが来たら古いランをキャンセルし、最新のみ実行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set cache keys
        id: cache-keys
        run: |
          NAMESPACE="webp-Linux-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'scripts/convert-to-webp.js') }}"
          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "key=$NAMESPACE-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Restore WebP cache
        id: webp-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            public/images
            .webp-cache
          key: ${{ steps.cache-keys.outputs.key }}
          restore-keys: |
            ${{ steps.cache-keys.outputs.namespace }}-

      - name: Convert images to WebP
        id: convert
        run: npm run prepare-images

      - name: Save WebP cache
        if: steps.convert.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            public/images
            .webp-cache
          key: ${{ steps.cache-keys.outputs.key }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build
        run: npm run build:app

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
